<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Bright hawk with orange/gold coloring, head facing LEFT -->
  <g transform="translate(80,0) scale(-1,1)">
    <!-- Body -->
    <ellipse cx="38" cy="44" rx="18" ry="13" fill="#ff8800"/>
    <!-- Chest -->
    <ellipse cx="42" cy="46" rx="11" ry="9" fill="#ffcc44"/>
    <!-- Head -->
    <circle cx="56" cy="30" r="11" fill="#ff9900"/>
    <circle cx="56" cy="30" r="12" fill="none" stroke="#ffbb44" stroke-width="1"/>
    <!-- Beak - bright orange -->
    <path d="M67 30 L78 27 L67 34 Z" fill="#ff4400"/>
    <!-- Eye - fierce -->
    <circle cx="60" cy="27" r="3.5" fill="#fff"/>
    <circle cx="60.5" cy="27" r="1.8" fill="#111"/>
    <!-- Eye ridge -->
    <path d="M55 24 L64 22" fill="none" stroke="#cc4400" stroke-width="2.5"/>
    <!-- Left wing (spread) - big and bright -->
    <path d="M22 44 Q6 26 0 34 Q6 42 14 38 Q4 28 16 36 Z" fill="#ffaa22"/>
    <path d="M16 36 Q2 18 0 24 Q6 28 8 24 Z" fill="#ff9900"/>
    <!-- Right wing -->
    <path d="M38 34 Q32 18 42 12 Q46 24 40 32 Z" fill="#ffaa22"/>
    <!-- Tail feathers - bright -->
    <path d="M20 46 Q8 52 2 60 Q14 54 18 48 Z" fill="#ff7700"/>
    <path d="M20 50 Q6 58 0 66 Q14 60 18 52 Z" fill="#ffaa22"/>
    <!-- Talons -->
    <path d="M32 56 L28 66 L34 60 L30 70 L38 60" fill="none" stroke="#ff6600" stroke-width="2.5"/>
    <path d="M44 56 L40 66 L46 60 L42 70 L50 60" fill="none" stroke="#ff6600" stroke-width="2.5"/>
    <!-- Glow -->
    <ellipse cx="38" cy="44" rx="20" ry="15" fill="none" stroke="#ffcc44" stroke-width="1" opacity="0.4"/>
  </g>
</svg>