<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Big bright bat with neon purple/magenta wings -->
  <!-- Body -->
  <ellipse cx="40" cy="42" rx="14" ry="11" fill="#cc44ff"/>
  <!-- Left wing -->
  <path d="M26 42 Q10 22 2 32 Q8 38 16 34 Q8 26 20 34 Z" fill="#ff44ff" stroke="#ff88ff" stroke-width="1"/>
  <path d="M20 34 Q4 16 0 22 Q6 28 10 24 Z" fill="#ee33ee"/>
  <!-- Right wing -->
  <path d="M54 42 Q70 22 78 32 Q72 38 64 34 Q72 26 60 34 Z" fill="#ff44ff" stroke="#ff88ff" stroke-width="1"/>
  <path d="M60 34 Q76 16 80 22 Q74 28 70 24 Z" fill="#ee33ee"/>
  <!-- Eyes - big glowing -->
  <circle cx="34" cy="38" r="5" fill="#ff0000"/>
  <circle cx="46" cy="38" r="5" fill="#ff0000"/>
  <circle cx="34" cy="37" r="2.5" fill="#ffff00"/>
  <circle cx="46" cy="37" r="2.5" fill="#ffff00"/>
  <!-- Ears -->
  <path d="M32 31 L28 18 L38 31 Z" fill="#dd33ff"/>
  <path d="M48 31 L52 18 L42 31 Z" fill="#dd33ff"/>
  <!-- Fangs -->
  <path d="M36 48 L38 56 L40 48 Z" fill="white"/>
  <path d="M44 48 L42 56 L40 48 Z" fill="white"/>
  <!-- Glow outline -->
  <ellipse cx="40" cy="42" rx="15" ry="12" fill="none" stroke="#ff88ff" stroke-width="1.5" opacity="0.5"/>
</svg>