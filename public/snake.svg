<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60">
  <!-- Proper snake: long coiling body with bright green/lime colors -->
  <!-- Tail coil -->
  <path d="M8 30 Q8 12 22 12 Q36 12 36 26" fill="none" stroke="#44ff44" stroke-width="10" stroke-linecap="round"/>
  <!-- Mid body coil -->
  <path d="M36 26 Q36 42 50 42 Q64 42 64 28" fill="none" stroke="#33ee33" stroke-width="11" stroke-linecap="round"/>
  <!-- Front body -->
  <path d="M64 28 Q64 14 78 14 Q90 14 94 24" fill="none" stroke="#44ff44" stroke-width="12" stroke-linecap="round"/>
  <!-- Head -->
  <ellipse cx="100" cy="24" rx="12" ry="9" fill="#66ff44"/>
  <ellipse cx="100" cy="24" rx="13" ry="10" fill="none" stroke="#88ff66" stroke-width="1.5"/>
  <!-- Eyes - bright and menacing -->
  <circle cx="104" cy="20" r="4" fill="#ffff00"/>
  <ellipse cx="105" cy="20" rx="1.5" ry="3" fill="#111"/>
  <!-- Tongue -->
  <path d="M112 24 L118 20 M112 24 L118 28" fill="none" stroke="#ff3333" stroke-width="2" stroke-linecap="round"/>
  <!-- Scale pattern - bright diamonds -->
  <path d="M20 12 L24 8 L28 12 L24 16 Z" fill="#88ff44" opacity="0.6"/>
  <path d="M42 42 L46 38 L50 42 L46 46 Z" fill="#88ff44" opacity="0.6"/>
  <path d="M66 14 L70 10 L74 14 L70 18 Z" fill="#88ff44" opacity="0.6"/>
  <!-- Belly highlight -->
  <path d="M36 30 Q50 48 64 32" fill="none" stroke="#aaff88" stroke-width="3" opacity="0.4"/>
  <path d="M64 22 Q78 8 94 22" fill="none" stroke="#aaff88" stroke-width="3" opacity="0.4"/>
</svg>