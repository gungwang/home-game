  <!-- Legs -->
  <line x1="16" y1="28" x2="14" y2="34" stroke="#757575" stroke-width="2"/>
  <line x1="28" y1="28" x2="30" y2="34" stroke="#757575" stroke-width="2"/>
  <!-- Paws -->
  <ellipse cx="14" cy="35" rx="2.5" ry="1.2" fill="#757575"/>
  <ellipse cx="30" cy="35" rx="2.5" ry="1.2" fill="#757575"/>
