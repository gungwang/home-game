<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48">
  <!-- Rat/mouse facing LEFT — pointy snout, round ears, thin tail -->
  <g transform="translate(64,0) scale(-1,1)">
    <!-- Body - rounder, smaller than a cat -->
    <ellipse cx="24" cy="28" rx="15" ry="11" fill="#00ccff"/>
    <!-- Belly -->
    <ellipse cx="24" cy="32" rx="10" ry="6" fill="#66eeff"/>
    <!-- Head - elongated/pointy for mouse look -->
    <ellipse cx="44" cy="22" rx="12" ry="8" fill="#00ddff"/>
    <!-- Pointy snout -->
    <path d="M56 22 L64 20 L56 24 Z" fill="#00eeff"/>
    <!-- Nose - pink dot at tip -->
    <circle cx="62" cy="21" r="2.5" fill="#ff6688"/>
    <!-- Round ears - distinctive mouse ears, rounder & bigger -->
    <circle cx="40" cy="12" r="7" fill="#00bbee"/>
    <circle cx="50" cy="10" r="7" fill="#00bbee"/>
    <!-- Inner ear pink -->
    <circle cx="40" cy="12" r="4.5" fill="#ff8899" opacity="0.7"/>
    <circle cx="50" cy="10" r="4.5" fill="#ff8899" opacity="0.7"/>
    <!-- Eyes - beady -->
    <circle cx="48" cy="20" r="3" fill="#ff1744"/>
    <circle cx="48" cy="20" r="1.3" fill="#ffff00"/>
    <!-- Whiskers -->
    <line x1="56" y1="19" x2="64" y2="15" stroke="#88ffff" stroke-width="0.8"/>
    <line x1="56" y1="21" x2="64" y2="21" stroke="#88ffff" stroke-width="0.8"/>
    <line x1="56" y1="23" x2="64" y2="27" stroke="#88ffff" stroke-width="0.8"/>
    <!-- Thin long tail - rats have thin worm-like tails -->
    <path d="M9 28 Q0 22 2 12 Q0 6 4 2" fill="none" stroke="#00aadd" stroke-width="2" stroke-linecap="round"/>
    <!-- Small legs -->
    <line x1="18" y1="37" x2="15" y2="44" stroke="#00bbee" stroke-width="2.5"/>
    <line x1="30" y1="37" x2="33" y2="44" stroke="#00bbee" stroke-width="2.5"/>
    <!-- Tiny paws -->
    <ellipse cx="15" cy="45" rx="3" ry="1.5" fill="#00bbee"/>
    <ellipse cx="33" cy="45" rx="3" ry="1.5" fill="#00bbee"/>
    <!-- Glow -->
    <ellipse cx="30" cy="26" rx="22" ry="14" fill="none" stroke="#66eeff" stroke-width="1" opacity="0.4"/>
  </g>
</svg>