  <!-- Belly -->
  <ellipse cx="22" cy="23" rx="10" ry="5" fill="#9e9e9e"/>
  <!-- Head -->
  <ellipse cx="38" cy="16" rx="7" ry="6" fill="#757575"/>
  <!-- Ears -->
  <path d="M34 10 L32 4 L36 10 Z" fill="#6d6d6d"/>
  <path d="M40 10 L42 4 L38 10 Z" fill="#6d6d6d"/>
